<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thoughts 3D</title>
<script type="importmap">
{
  "imports": {
    "three": "./lib/three/three.module.js",
    "three/addons/": "./lib/three/"
  }
}
</script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="container">
  <div id="webgl-canvas"></div>
  <div id="label-canvas"></div>

  <div id="top-bar">
    <input id="search-input" type="text" placeholder="Buscar ideia..." />
    <button id="btn-new-root">+ Nova Ideia</button>
    <button id="btn-layout" class="secondary">Reorganizar</button>
  </div>

  <div id="side-panel">
    <div class="panel-title" id="panel-title">Selecione um nó</div>
    <div class="panel-sub" id="panel-sub">Clique em qualquer ideia no espaço 3D</div>
    <div id="panel-id-badge" style="display:none; margin-bottom:12px;">
      <span id="panel-id-code" style="display:inline-block; background:rgba(239,68,68,0.2); color:#ef4444; padding:2px 10px; border-radius:6px; font-size:12px; font-weight:700; letter-spacing:0.5px;"></span>
    </div>
    <div id="panel-cause-group" class="panel-field" style="display:none;">
      <label>Causa Raiz</label>
      <div id="panel-cause-display" style="background:rgba(30,41,59,0.8); border:1px solid rgba(71,85,105,0.3); border-radius:8px; padding:10px 12px; font-size:13px; color:#94a3b8;"></div>
    </div>
    <div id="panel-impact-group" class="panel-field" style="display:none;">
      <label>Impacto Estimado</label>
      <div id="panel-impact-display" style="background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); border-radius:8px; padding:10px 12px; font-size:13px; color:#f87171; font-weight:500;"></div>
    </div>
    <hr style="border:none;border-top:1px solid rgba(71,85,105,0.2);margin:12px 0;">
    <div class="panel-field">
      <label>Nome</label>
      <input id="panel-name" type="text" />
    </div>
    <div class="panel-field">
      <label>Tipo</label>
      <select id="panel-type">
        <option value="idea">💡 Ideia</option>
        <option value="problem">🔴 Problema</option>
        <option value="module">📦 Módulo</option>
        <option value="info">📋 Info</option>
        <option value="tech">⚙️ Tech</option>
        <option value="category">📁 Categoria</option>
      </select>
    </div>
    <div class="panel-field">
      <label>Descrição</label>
      <textarea id="panel-desc" rows="2"></textarea>
    </div>
    <div class="panel-actions">
      <button class="btn-primary" id="panel-save">Salvar</button>
      <button class="btn-secondary" id="panel-add-child">+ Filho</button>
      <button class="btn-danger" id="panel-delete">Excluir</button>
    </div>
  </div>

  <div id="context-menu">
    <div class="ctx-item" data-action="add-child"><span class="ctx-icon">➕</span> Adicionar filho</div>
    <div class="ctx-item" data-action="add-sibling"><span class="ctx-icon">↔️</span> Adicionar irmão</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item" data-action="focus"><span class="ctx-icon">🎯</span> Focar câmera</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item danger" data-action="delete"><span class="ctx-icon">🗑️</span> Excluir</div>
  </div>

  <div id="bottom-bar">
    <span style="font-size:10px;color:#64748b;font-weight:600;letter-spacing:0.5px;margin-right:4px;">FILTRAR</span>
    <button class="filter-btn active" data-filter="problem-critical" style="--dot:#ef4444"><span class="legend-dot" style="background:#ef4444"></span> Crítico</button>
    <button class="filter-btn active" data-filter="problem-severe" style="--dot:#eab308"><span class="legend-dot" style="background:#eab308"></span> Grave</button>
    <button class="filter-btn active" data-filter="problem-moderate" style="--dot:#f97316"><span class="legend-dot" style="background:#f97316"></span> Moderado</button>
    <button class="filter-btn active" data-filter="module" style="--dot:#3b82f6"><span class="legend-dot" style="background:#3b82f6"></span> Módulo</button>
    <button class="filter-btn active" data-filter="tech" style="--dot:#8b5cf6"><span class="legend-dot" style="background:#8b5cf6"></span> Stack</button>
    <button class="filter-btn active" data-filter="info" style="--dot:#64748b"><span class="legend-dot" style="background:#64748b"></span> Info</button>
    <button class="filter-btn active" data-filter="category" style="--dot:#a78bfa"><span class="legend-dot" style="background:#a78bfa"></span> Categoria</button>
    <button class="filter-btn active" data-filter="idea" style="--dot:#60a5fa"><span class="legend-dot" style="background:#60a5fa"></span> Ideia</button>
    <div class="separator"></div>
    <button id="btn-focus" class="bottom-btn" title="Destacar apenas nó selecionado e suas conexões">🎯 Foco</button>
    <div class="separator"></div>
    <span id="node-count" style="font-size:11px;color:#94a3b8;">0 nós</span>
    <span id="edge-count" style="font-size:11px;color:#94a3b8;">0 conexões</span>
  </div>

  <div id="stats">Arraste para orbitar · Scroll para zoom<br/>Clique p/ selecionar · Direito p/ menu · F = modo foco</div>

  <div id="modal-overlay">
    <div id="modal">
      <h2 id="modal-title">Nova Ideia</h2>
      <div class="modal-sub" id="modal-sub">Adicione um nó ao grafo de pensamentos</div>
      <div class="modal-field">
        <label>Nome</label>
        <input id="modal-name" type="text" placeholder="Ex: Sistema de entregas" />
      </div>
      <div class="modal-field">
        <label>Tipo</label>
        <select id="modal-type">
          <option value="idea">💡 Ideia</option>
          <option value="problem">🔴 Problema</option>
          <option value="module">📦 Módulo</option>
          <option value="info">📋 Info</option>
          <option value="tech">⚙️ Tech</option>
          <option value="category">📁 Categoria</option>
        </select>
      </div>
      <div class="modal-field">
        <label>Descrição (opcional)</label>
        <textarea id="modal-desc" placeholder="Descreva sua ideia..."></textarea>
      </div>
      <div class="modal-field" id="modal-parent-field">
        <label>Conectado a (opcional — ID do nó pai)</label>
        <input id="modal-parent" type="text" placeholder="Deixe vazio para nó raiz" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="modal-cancel">Cancelar</button>
        <button class="btn-primary" id="modal-confirm">Criar</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
